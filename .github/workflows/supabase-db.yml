name: Supabase DB

on:
  push:
    branches:
      - main
      - master
    paths:
      - supabase/migrations/**
      - supabase/config.toml
  workflow_dispatch:

concurrency:
  group: supabase-db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check database configuration
        id: config
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::notice title=DB push skipped::SUPABASE_DB_URL is not configured"
            echo "missing=1" >> "$GITHUB_OUTPUT"
          else
            echo "missing=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.config.outputs.missing == '0'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        if: steps.config.outputs.missing == '0'
        run: supabase db push --db-url "$SUPABASE_DB_URL" --include-all
