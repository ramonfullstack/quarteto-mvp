name: Vercel Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      EXPECTED_VERCEL_PROJECT_NAME: quarteto-mvp
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXT_PUBLIC_DEMO_MODE: ${{ vars.NEXT_PUBLIC_DEMO_MODE }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: config
        run: |
          missing=0
          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN NEXT_PUBLIC_DEMO_MODE NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY; do
            if [ -z "${!name}" ]; then
              echo "::notice title=Deploy skipped::$name is not configured"
              missing=1
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.config.outputs.missing == '0'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.config.outputs.missing == '0'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.config.outputs.missing == '0'
        run: npm install --global vercel@latest

      - name: Verify Vercel target project
        if: steps.config.outputs.missing == '0'
        run: |
          node <<'EOF'
          const expectedName = process.env.EXPECTED_VERCEL_PROJECT_NAME;
          const projectId = process.env.VERCEL_PROJECT_ID;
          const token = process.env.VERCEL_TOKEN;

          async function main() {
            const response = await fetch(`https://api.vercel.com/v9/projects/${projectId}`, {
              headers: {
                Authorization: `Bearer ${token}`,
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Could not load Vercel project ${projectId}: ${response.status} ${body}`);
            }

            const project = await response.json();

            if (project.name !== expectedName) {
              throw new Error(
                `VERCEL_PROJECT_ID points to "${project.name}", but this repository expects "${expectedName}". Update the GitHub secret VERCEL_PROJECT_ID before deploying again.`,
              );
            }

            console.log(`Verified Vercel project: ${project.name}`);
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          EOF

      - name: Pull Vercel project settings
        if: steps.config.outputs.missing == '0'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          fi

      - name: Build Vercel output
        if: steps.config.outputs.missing == '0'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel build --token="$VERCEL_TOKEN"
          else
            vercel build --prod --token="$VERCEL_TOKEN"
          fi

      - name: Deploy preview
        if: steps.config.outputs.missing == '0' && github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.config.outputs.missing == '0' && github.event_name != 'pull_request'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
